<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ResQCare</title>
    <link rel="stylesheet" href="app.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
</head>
<body>
<header>
    <div class="navbar">
        <div class="logo">
            <a>ResQCare</a>
        </div>
        <ul class="links">
            <li><a href="#">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <a href="booknow.html" class="action_btn">Book Now</a>

        <div class="toggle_btn">
            <i class="fa-solid fa-bars"></i>
        </div>
    </div>

    <!-- FIXED CLASS NAME -->
    <div class="dropdown_menu">
        <li><a>Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="login.html" class="action_btn">Login</a></li>
    </div>
</header>
 <div class="text">
        <p>Emergency Bed Booking System</p>
</div>
<script>
    const toggleBtn = document.querySelector('.toggle_btn');
    const toggleBtnIcon = document.querySelector('.toggle_btn i');
    const dropdownMenu = document.querySelector('.dropdown_menu');

    toggleBtn.onclick = function() {
        dropdownMenu.classList.toggle('open');

        const isOpen = dropdownMenu.classList.contains('open');

        toggleBtnIcon.className = isOpen
            ? 'fa-solid fa-xmark'
            : 'fa-solid fa-bars';
    }
</script>
<a href="booknow.html" class="fixed_action_btn">
    <i class="fa-solid fa-heart-pulse"></i> Book Now
</a>
</body>
</html>
