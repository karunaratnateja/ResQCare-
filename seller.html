<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Open Sans',sans-serif;
}

body{
    background:#0a0a0a;
    color:#fff;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#111;
}

.logo{
    font-size:1.5rem;
    color:#ff2e2e;
}

/* LOGOUT */
.logout{
    background:#ff2e2e;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
}

.logout:hover{
    box-shadow:0 0 10px red;
}

/* FORM */
.form{
    padding:20px;
}

input, select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(135deg,#ff2e2e,#c40000);
    color:#fff;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(255,0,0,0.7);
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

/* CARD */
.card{
    background:#111;
    padding:15px;
    border-radius:10px;
    border-left:4px solid red;
}

/* DELETE */
.delete{
    margin-top:10px;
    padding:6px;
    background:red;
    border:none;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo"><i class="fa-solid fa-store"></i> Seller</div>
    <div class="logout" onclick="logout()">Logout</div>
</div>

<div class="form">

<select id="service">
<option value="Beds">Beds</option>
<option value="Food">Food</option>
<option value="Fuel">Fuel</option>
</select>

<input id="name" placeholder="Resource Name">
<input id="quantity" type="number" placeholder="Quantity">

<button class="btn" onclick="addResource(event)">Add Resource</button>

</div>

<div class="grid" id="resourceList"></div>

<script>
let resources = JSON.parse(localStorage.getItem("resources")) || [];

// ADD
function addResource(e){
    e.preventDefault();

    const service = document.getElementById("service").value;
    const name = document.getElementById("name").value;
    const quantity = document.getElementById("quantity").value;

    if(!name || !quantity){
        alert("Fill all fields");
        return;
    }

    resources.push({service,name,quantity});
    localStorage.setItem("resources", JSON.stringify(resources));

    render();

    document.getElementById("name").value="";
    document.getElementById("quantity").value="";
}

// DELETE
function deleteResource(index){
    resources.splice(index,1);
    localStorage.setItem("resources", JSON.stringify(resources));
    render();
}

// DISPLAY
function render(){
    const container = document.getElementById("resourceList");
    container.innerHTML="";

    resources.forEach((r,i)=>{
        container.innerHTML += `
        <div class="card">
            <h3>${r.name}</h3>
            <p>${r.service}</p>
            <p>Available: ${r.quantity}</p>
            <button class="delete" onclick="deleteResource(${i})">Delete</button>
        </div>
        `;
    });
}

// LOGOUT
function logout(){
    window.location.href = "login.html";
}

render();
</script>

</body>
</html>
