<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResQCare Signup</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Open Sans',sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
    url('https://static.vecteezy.com/system/resources/previews/042/231/605/non_2x/heart-pulse-and-heartbeat-heartbeat-lone-cardiogram-beautiful-healthcare-medical-background-modern-simple-design-for-medical-apps-websites-and-hospital-design-vector.jpg');
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
}

.container{
    width:360px;
    padding:30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius:15px;
}

/* TITLE */
h1{
    text-align:center;
    margin-bottom:20px;
}

/* INPUT BOX */
.input-box{
    margin-bottom:15px;
    position:relative;
}

.input-box i{
    position:absolute;
    top:50%;
    left:10px;
    transform:translateY(-50%);
    color:#ff2e2e;
}

input{
    width:100%;
    padding:10px 10px 10px 35px;
    border:none;
    border-radius:8px;
    outline:none;
}

/* BUTTON */
.btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:25px;
    background: linear-gradient(135deg, #ff2e2e, #c40000);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition: all 0.3s ease;
}

/* GLOW EFFECT */
.btn:hover{
    transform:scale(1.05);
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.7),
                0 0 30px rgba(255, 0, 0, 0.5);
}

/* LINK */
.link{
    text-align:center;
    margin-top:15px;
    font-size:0.9rem;
}

.link a{
    color:#ff2e2e;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
    <h1><i class="fa-solid fa-user-plus"></i> Sign Up</h1>

    <div class="input-box">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Full Name">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="Email">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-phone"></i>
        <input type="tel" placeholder="Mobile Number">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Password">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Confirm Password">
    </div>

    <button class="btn" onclick="signup()">
        <i class="fa-solid fa-user-check"></i> Create Account
    </button>

    <div class="link">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<script>
function signup(){
    alert("Account Created Successfully");
            window.location.href = "account.html";

}
</script>

</body>
</html>
