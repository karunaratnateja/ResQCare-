<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResQCare Resources</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Open Sans',sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
    url('https://static.vecteezy.com/system/resources/previews/042/231/605/non_2x/heart-pulse-and-heartbeat-heartbeat-lone-cardiogram-beautiful-healthcare-medical-background-modern-simple-design-for-medical-apps-websites-and-hospital-design-vector.jpg');
    background-size:cover;
    color:#fff;
    padding:20px;
}

/* TITLE */
h1{
    text-align:center;
    margin-bottom:25px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding:20px;
    border-radius:15px;
    border-left:4px solid #ff2e2e;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(255,0,0,0.5);
}

/* TEXT */
.card h3{
    margin-bottom:8px;
}

.card p{
    opacity:0.8;
    font-size:0.9rem;
}

/* BUTTON */
.btn{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:25px;
    background: linear-gradient(135deg,#ff2e2e,#c40000);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(255,0,0,0.7);
}

/* EMPTY */
.empty{
    text-align:center;
    margin-top:30px;
    opacity:0.7;
}
</style>
</head>

<body>

<h1><i class="fa-solid fa-heart-pulse"></i> Available Resources</h1>

<div id="resourceList" class="grid"></div>

<p id="emptyMsg" class="empty"></p>

<script>
let resources = JSON.parse(localStorage.getItem("resources")) || [];
let requests = JSON.parse(localStorage.getItem("requests")) || [];

const container = document.getElementById("resourceList");
const emptyMsg = document.getElementById("emptyMsg");

// LOAD RESOURCES
function loadResources(){
    container.innerHTML = "";

    if(resources.length === 0){
        emptyMsg.innerText = "No resources available";
        return;
    }

    emptyMsg.innerText = "";

    resources.forEach((res, index) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${res.name}</h3>
            <p><strong>Type:</strong> ${res.service}</p>
            <p><strong>Available:</strong> ${res.quantity}</p>
            <button class="btn" onclick="requestResource(${index})">
                <i class="fa-solid fa-hand-holding-medical"></i> Request
            </button>
        `;

        container.appendChild(card);
    });
}

// REQUEST FUNCTION
function requestResource(index){
    let user = prompt("Enter your name");
    let qty = prompt("Enter quantity");

    if(user && qty){
        requests.push({
            name: resources[index].name,
            service: resources[index].service,
            qty: qty,
            user: user
        });

        localStorage.setItem("requests", JSON.stringify(requests));

        alert("Request sent successfully!");
    }
}

loadResources();
</script>

</body>
</html>
